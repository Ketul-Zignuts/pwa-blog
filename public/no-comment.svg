<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background decorative elements -->
  <circle cx="100" cy="100" r="60" fill="#E8F4FF" opacity="0.5"/>
  <circle cx="700" cy="500" r="80" fill="#E8F4FF" opacity="0.5"/>
  <circle cx="650" cy="120" r="50" fill="#F0F9FF" opacity="0.6"/>
  <circle cx="150" cy="500" r="70" fill="#F0F9FF" opacity="0.6"/>
  
  <!-- Floating comment icons (background) -->
  <g opacity="0.3">
    <!-- Top left comment bubble -->
    <path d="M 80 180 Q 80 160 100 160 L 150 160 Q 170 160 170 180 L 170 210 Q 170 230 150 230 L 120 230 L 110 245 L 110 230 L 100 230 Q 80 230 80 210 Z" fill="#93C5FD"/>
    
    <!-- Top right comment bubble -->
    <path d="M 680 80 Q 680 60 700 60 L 750 60 Q 770 60 770 80 L 770 110 Q 770 130 750 130 L 720 130 L 710 145 L 710 130 L 700 130 Q 680 130 680 110 Z" fill="#93C5FD"/>
    
    <!-- Bottom left comment bubble -->
    <path d="M 50 450 Q 50 430 70 430 L 120 430 Q 140 430 140 450 L 140 480 Q 140 500 120 500 L 90 500 L 80 515 L 80 500 L 70 500 Q 50 500 50 480 Z" fill="#93C5FD"/>
  </g>
  
  <!-- Main illustration container -->
  <g transform="translate(400, 300)">
    <!-- Large speech bubble (sad/empty) -->
    <g id="mainBubble">
      <!-- Bubble shadow -->
      <ellipse cx="0" cy="130" rx="140" ry="20" fill="#000000" opacity="0.1"/>
      
      <!-- Main bubble body -->
      <path d="M -120 -20 Q -120 -100 -40 -100 L 40 -100 Q 120 -100 120 -20 L 120 60 Q 120 140 40 140 L -20 140 L -50 170 L -50 140 L -40 140 Q -120 140 -120 60 Z" 
            fill="#DBEAFE" 
            stroke="#60A5FA" 
            stroke-width="4"/>
      
      <!-- Sad face inside bubble -->
      <g id="sadFace">
        <!-- Left eye (X shape) -->
        <g transform="translate(-45, 10)">
          <line x1="-10" y1="-10" x2="10" y2="10" stroke="#60A5FA" stroke-width="4" stroke-linecap="round"/>
          <line x1="10" y1="-10" x2="-10" y2="10" stroke="#60A5FA" stroke-width="4" stroke-linecap="round"/>
        </g>
        
        <!-- Right eye (X shape) -->
        <g transform="translate(45, 10)">
          <line x1="-10" y1="-10" x2="10" y2="10" stroke="#60A5FA" stroke-width="4" stroke-linecap="round"/>
          <line x1="10" y1="-10" x2="-10" y2="10" stroke="#60A5FA" stroke-width="4" stroke-linecap="round"/>
        </g>
        
        <!-- Sad mouth (frown) -->
        <path d="M -35 70 Q 0 50 35 70" 
              stroke="#60A5FA" 
              stroke-width="4" 
              stroke-linecap="round" 
              fill="none"/>
      </g>
      
      <!-- Empty lines inside bubble (representing no text) -->
      <g opacity="0.3">
        <line x1="-80" y1="-60" x2="80" y2="-60" stroke="#60A5FA" stroke-width="2" stroke-dasharray="5,5"/>
        <line x1="-80" y1="-40" x2="60" y2="-40" stroke="#60A5FA" stroke-width="2" stroke-dasharray="5,5"/>
        <line x1="-80" y1="-20" x2="70" y2="-20" stroke="#60A5FA" stroke-width="2" stroke-dasharray="5,5"/>
      </g>
    </g>
    
    <!-- Small floating bubbles around main bubble -->
    <g id="floatingBubbles">
      <!-- Top left small bubble -->
      <circle cx="-150" cy="-80" r="15" fill="#BFDBFE" opacity="0.6">
        <animate attributeName="cy" values="-80;-90;-80" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-140" cy="-100" r="10" fill="#BFDBFE" opacity="0.4">
        <animate attributeName="cy" values="-100;-110;-100" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      
      <!-- Top right small bubble -->
      <circle cx="150" cy="-70" r="12" fill="#BFDBFE" opacity="0.5">
        <animate attributeName="cy" values="-70;-80;-70" dur="2.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="165" cy="-95" r="8" fill="#BFDBFE" opacity="0.4">
        <animate attributeName="cy" values="-95;-105;-95" dur="3.2s" repeatCount="indefinite"/>
      </circle>
      
      <!-- Bottom right small bubble -->
      <circle cx="140" cy="100" r="10" fill="#BFDBFE" opacity="0.5">
        <animate attributeName="cy" values="100;110;100" dur="2.6s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Magnifying glass icon (searching for comments) -->
    <g transform="translate(180, -130)" opacity="0.7">
      <circle cx="0" cy="0" r="25" fill="none" stroke="#3B82F6" stroke-width="3"/>
      <line x1="18" y1="18" x2="35" y2="35" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
      <text x="0" y="8" font-size="24" fill="#3B82F6" text-anchor="middle" font-family="Arial, sans-serif">?</text>
    </g>
    
    <!-- Empty box icon (no content) -->
    <g transform="translate(-180, -120)" opacity="0.6">
      <rect x="-20" y="-15" width="40" height="35" fill="none" stroke="#60A5FA" stroke-width="2.5" rx="3"/>
      <line x1="-20" y1="-5" x2="20" y2="-5" stroke="#60A5FA" stroke-width="2.5"/>
      <line x1="-10" y1="5" x2="10" y2="5" stroke="#60A5FA" stroke-width="2" opacity="0.5"/>
      <line x1="-10" y1="12" x2="10" y2="12" stroke="#60A5FA" stroke-width="2" opacity="0.5"/>
    </g>
  </g>
  
  <!-- Text at bottom -->
  <g transform="translate(400, 520)">
    <text x="0" y="0" font-size="32" font-weight="600" fill="#1E40AF" text-anchor="middle" font-family="Arial, sans-serif">
      No Comments Yet
    </text>
    <text x="0" y="35" font-size="16" fill="#60A5FA" text-anchor="middle" font-family="Arial, sans-serif">
      Be the first to share your thoughts!
    </text>
  </g>
  
  <!-- Decorative dots pattern -->
  <g opacity="0.2">
    <circle cx="250" cy="100" r="3" fill="#3B82F6"/>
    <circle cx="270" cy="100" r="3" fill="#3B82F6"/>
    <circle cx="290" cy="100" r="3" fill="#3B82F6"/>
    
    <circle cx="520" cy="500" r="3" fill="#3B82F6"/>
    <circle cx="540" cy="500" r="3" fill="#3B82F6"/>
    <circle cx="560" cy="500" r="3" fill="#3B82F6"/>
  </g>
  
  <!-- Cross/X symbols decoration -->
  <g opacity="0.2">
    <g transform="translate(200, 450)">
      <line x1="-6" y1="-6" x2="6" y2="6" stroke="#3B82F6" stroke-width="2"/>
      <line x1="6" y1="-6" x2="-6" y2="6" stroke="#3B82F6" stroke-width="2"/>
    </g>
    <g transform="translate(600, 200)">
      <line x1="-6" y1="-6" x2="6" y2="6" stroke="#3B82F6" stroke-width="2"/>
      <line x1="6" y1="-6" x2="-6" y2="6" stroke="#3B82F6" stroke-width="2"/>
    </g>
  </g>
</svg>